{% extends "admin/base_site.html" %}
{% block content %}
<form action="" method="post">
    {% csrf_token %}
    <p>Set a new secure password for the administrative root of the selected school:</p>
    {{ form.as_p }}
    <input type="hidden" name="action" value="reset_tenant_admin_password" />
    <input type="submit" name="apply" value="Update Secure Password Table" style="background: #79aec8; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer;" />
</form>
{% endblock %}
