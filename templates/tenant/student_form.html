<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Student Node</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b1329; color: #f1f5f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .form-card { background: #1c2541; padding: 40px; border-radius: 12px; border: 1px solid #3a506b; max-width: 450px; width: 100%; box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        h2 { color: #6fffe9; margin-top: 0; margin-bottom: 25px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #8da2bb; font-weight: 500; }
        input[type="text"] { width: 100%; padding: 12px; background: #0b1329; border: 1px solid #3a506b; border-radius: 6px; color: #fff; box-sizing: border-box; }
        input[type="text"]:focus { border-color: #6fffe9; outline: none; }
        .btn-submit { width: 100%; background: #6fffe9; color: #0b1329; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1em; margin-top: 10px; }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; color: #8da2bb; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Student Induction Wizard</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter student's legal name" required>
            </div>
            <div class="form-group">
                <label>Roll Number Token</label>
                <input type="text" name="roll_number" placeholder="e.g. AX-2026-99" required>
            </div>
            <div class="form-group">
                <label>Grade Level / Class</label>
                <input type="text" name="grade" placeholder="e.g. 10th Grade" required>
            </div>
            <button type="submit" class="btn-submit">Commit Profile to Tenant Ledger</button>
            <a href="{% url 'school_home' %}" class="btn-cancel">Abort & Return to Command Dashboard</a>
        </form>
    </div>
</body>
</html>
